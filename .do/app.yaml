name: sonrisia-portal
region: nyc

# Componente 1: Servidor Backend (API Proxy Seguro)
services:
  - name: backend
    github:
      branch: main
      deploy_on_push: true
      repo: tu-usuario/tu-repo
    source_dir: server
    build_command: npm install
    run_command: npm start
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs
    
    # Variables de entorno del backend
    envs:
      - key: AIRTABLE_API_KEY
        scope: RUN_TIME
        type: SECRET
        # Configura este valor en la interfaz de Digital Ocean
      - key: AIRTABLE_BASE_ID
        value: appRMClMob8KPNooU
        scope: RUN_TIME
      - key: AIRTABLE_SERVICES_BASE_ID
        value: appX3CBiSmPy4119D
        scope: RUN_TIME
      - key: AIRTABLE_REGISTROS_BASE_ID
        value: applcT2fcdNDpCRQ0
        scope: RUN_TIME
      - key: CLIENT_URL
        value: ${APP_URL}
        scope: RUN_TIME
    
    health_check:
      http_path: /api/health

# Componente 2: Frontend (Static Site)
static_sites:
  - name: frontend
    github:
      branch: main
      deploy_on_push: true
      repo: tu-usuario/tu-repo
    build_command: npm install && npm run build
    output_dir: dist
    
    # Variables de entorno del frontend
    envs:
      - key: VITE_BACKEND_URL
        value: ${backend.PUBLIC_URL}
        scope: BUILD_TIME
      - key: VITE_SUPABASE_URL
        value: https://bmnwfimrcblnvmkbflwn.supabase.co
        scope: BUILD_TIME
